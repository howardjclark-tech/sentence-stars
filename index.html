<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Stars ⭐</title>

<style>
body{
  font-family:Arial;
  background:#fff9f0;
  padding:20px;
  text-align:center;
}
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}
.word{
  display:inline-block;
  padding:8px 14px;
  margin:6px;
  border:2px solid #3a86ff;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.word.used{opacity:0.3}
.slot{
  min-height:40px;
  margin-bottom:10px;
  font-weight:bold;
}
button{
  padding:12px;
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:12px;
  font-weight:bold;
}
.submit{background:#ffbe0b}
.next{background:#3a86ff;color:white}
</style>
</head>

<body>

<h2>⭐ Sentence Stars</h2>

<div class="card">
  <div id="slot" class="slot">Tap words to build sentence</div>
  <div id="words"></div>

  <button class="submit" onclick="check()">Check</button>
  <div id="feedback"></div>
  <button class="next" onclick="loadQuestion()">Next</button>
</div>

<script>
let currentQ = null;
let placed = [];

// 🧠 SAFE fallback questions (always works)
const fallbackQuestions = [
  {
    sentence:"The cat ran fast",
    words:["ran","The","fast","cat"]
  },
  {
    sentence:"The dog jumped high",
    words:["jumped","The","high","dog"]
  },
  {
    sentence:"The bird flew away",
    words:["flew","The","away","bird"]
  }
];

// 🔊 voice
function speak(text){
  try{
    const u=new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(u);
  }catch(e){}
}

// 🎯 LOAD QUESTION (CRASH-PROOF)
async function loadQuestion(){
  document.getElementById("feedback").textContent="";
  placed=[];

  let success = false;

  try{
    const res = await fetch("/api/question",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        messages:[{
          role:"user",
          content:`Create a simple fun sentence for kids.

Return JSON:
{
"sentence":"The funny monkey climbed the tree",
"words":["monkey","The","tree","climbed","funny","the"]
}`
        }]
      })
    });

    const data = await res.json();
    let text = data.content?.[0]?.text || "";

    // Clean AI response
    text = text.replace(/```json|```/g,"").trim();

    const parsed = JSON.parse(text);

    // Validate structure
    if(parsed.sentence && parsed.words){
      currentQ = parsed;
      success = true;
    }

  }catch(e){
    console.log("AI failed:", e);
  }

  // 🛟 fallback if anything fails
  if(!success){
    currentQ = fallbackQuestions[Math.floor(Math.random()*fallbackQuestions.length)];
  }

  render();
}

// 🎨 RENDER
function render(){
  const wordsDiv = document.getElementById("words");
  const slot = document.getElementById("slot");

  wordsDiv.innerHTML="";
  slot.textContent="";

  currentQ.words
    .sort(()=>Math.random()-0.5)
    .forEach(word=>{
      const el=document.createElement("div");
      el.className="word";
      el.textContent=word;

      el.onclick=()=>{
        el.classList.add("used");
        placed.push(word);
        slot.textContent = placed.join(" ");
      };

      wordsDiv.appendChild(el);
    });
}

// ✅ CHECK ANSWER
function check(){
  const user = placed.join(" ").toLowerCase();
  const correct = currentQ.sentence.toLowerCase();

  if(user===correct){
    document.getElementById("feedback").textContent="✅ Correct!";
    speak(currentQ.sentence);
  }else{
    document.getElementById("feedback").textContent=
      "❌ Try again → "+currentQ.sentence;
  }
}

// 🚀 INIT
loadQuestion();
</script>

</body>
</html>
